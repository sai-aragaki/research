<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Archive</title>
<meta name="description" content="深掘りリサーチの読み物アーカイブ。">
<meta property="og:title" content="Research Archive">
<meta property="og:description" content="深掘りリサーチの読み物アーカイブ。">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b3a3e;--ink-soft:#46585c;
    --teal:#62b8a0;--teal-deep:#4f7c87;--teal-wash:#eef6f3;
    --coral:#eb6584;--coral-wash:#fdeef1;
    --paper:#fbfcfb;--panel:#f4f7f5;
    --line:#e3e8e4;--line-strong:#cdd6d1;--muted:#74827f;
    --sidebar-w:400px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--paper);color:var(--ink);
    font-family:"Noto Sans JP",sans-serif;font-weight:400;line-height:1.85;font-size:15px;
    -webkit-font-smoothing:antialiased;letter-spacing:.01em;height:100vh;overflow:hidden}
  a{text-decoration:none;color:inherit}
  ::selection{background:var(--coral);color:#fff}
  button{font-family:inherit;border:none;background:none;cursor:pointer}

  /* ======== DESKTOP SHELL ======== */
  .shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh}

  /* ---- left column ---- */
  .left{display:flex;flex-direction:column;height:100vh;border-right:1px solid var(--line);overflow:hidden}
  .left-head{flex-shrink:0;padding:20px 20px 0}
  .eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.18em;color:var(--teal-deep);text-transform:uppercase;margin:0 0 16px;display:flex;align-items:center}
  .eyebrow::before{content:"";display:inline-block;width:22px;height:2px;background:var(--teal);margin-right:10px}

  .toolbar{flex-shrink:0;padding:0 20px 14px;border-bottom:1px solid var(--line);background:var(--paper)}
  .search{position:relative;margin:0 0 12px}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted);pointer-events:none}
  .search input{
    width:100%;font-family:"Noto Sans JP",sans-serif;font-size:13.5px;color:var(--ink);
    padding:10px 14px 10px 38px;border:1px solid var(--line-strong);border-radius:10px;
    background:#fff;outline:none;transition:border-color .2s,box-shadow .2s}
  .search input::placeholder{color:var(--muted)}
  .search input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-wash)}
  .filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .chip{font-size:12px;font-weight:500;letter-spacing:.02em;
    padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);
    cursor:pointer;white-space:nowrap;transition:all .2s ease}
  .chip:hover{border-color:var(--teal);color:var(--teal-deep)}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#fff}
  .chip.flag-chip{border-color:var(--coral);color:var(--coral)}
  .chip.flag-chip:hover{background:var(--coral-wash)}
  .chip.flag-chip.active{background:var(--coral);border-color:var(--coral);color:#fff}
  .chip .c{font-size:10px;opacity:.6;margin-left:4px;font-feature-settings:"tnum"}

  .count{font-size:11.5px;letter-spacing:.04em;color:var(--muted);padding:12px 20px 4px;flex-shrink:0}
  .list{flex:1;overflow-y:auto;padding:0 0 40px;-webkit-overflow-scrolling:touch}

  /* ---- entry ---- */
  .entry{position:relative;padding:14px 20px;border-bottom:1px solid var(--line);
    cursor:pointer;transition:background .2s ease}
  .entry:hover{background:var(--panel)}
  .entry.is-active{background:var(--teal-wash)}
  .entry.is-active .t{color:var(--teal-deep)}

  .cat{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--coral);margin:0 0 3px}
  .t{font-family:"Noto Serif JP",serif;font-weight:700;font-size:15px;line-height:1.45;margin:0 0 2px;padding-right:30px;transition:color .2s ease}
  .s{font-size:12px;color:var(--muted);line-height:1.6;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  mark{background:var(--teal-wash);color:var(--teal-deep);font-weight:700;border-radius:2px;padding:0 1px}

  /* bookmark icon: top-right of entry */
  .bm{position:absolute;top:12px;right:16px;width:28px;height:28px;
    display:flex;align-items:center;justify-content:center;
    border-radius:6px;color:var(--line-strong);transition:color .15s,background .15s;z-index:2}
  .bm:hover{color:var(--coral);background:var(--coral-wash)}
  .bm.on{color:var(--coral)}
  .bm svg{width:16px;height:16px}

  .empty-msg{display:none;padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}

  /* ---- right column (reader) ---- */
  .right{display:flex;flex-direction:column;height:100vh;background:#fff;position:relative}
  .reader-bar{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:10px 20px;
    border-bottom:1px solid var(--line);background:var(--paper);min-height:46px}
  .reader-title{font-family:"Noto Serif JP",serif;font-size:13px;font-weight:600;color:var(--ink-soft);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .reader-link{font-size:12px;font-weight:500;color:var(--teal-deep);padding:5px 12px;
    border:1px solid var(--teal);border-radius:8px;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .reader-link:hover{background:var(--teal-deep);color:#fff}
  .reader-frame{flex:1;border:none;width:100%;height:100%}
  .reader-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted)}
  .reader-empty svg{width:48px;height:48px;color:var(--line-strong)}
  .reader-empty span{max-width:240px;text-align:center;line-height:1.7;font-size:13px}

  /* ---- mobile back bar (hidden by default, shown only when reader is open) ---- */
  .mob-back{display:none}

  /* ---- animation ---- */
  .fade{opacity:0;transform:translateY(8px);animation:fin .45s ease forwards}
  @keyframes fin{to{opacity:1;transform:none}}

  /* ======== MOBILE ======== */
  @media(max-width:860px){
    .shell{grid-template-columns:1fr}
    .left{height:100vh;overflow-y:auto}
    .left-head{padding:16px 16px 0}
    .toolbar{padding:0 16px 12px}
    .count{padding:8px 16px 4px}
    .list{overflow:visible;padding-bottom:140px}
    .entry{padding:12px 16px}
    .bm{right:12px;top:10px}

    /* Reader: full-screen overlay, below the back bar */
    .right{position:fixed;top:50px;left:0;right:0;bottom:0;z-index:100;height:auto;
      transform:translateX(100%);transition:transform .3s ease}
    .right.open{transform:translateX(0)}
    .reader-bar{display:none}

    /* Mobile back bar: fixed top, only visible when reader is open */
    .mob-back{
      display:none;position:fixed;top:0;left:0;right:0;z-index:200;
      height:50px;padding:0 16px;
      background:var(--paper);border-bottom:1px solid var(--line);
      align-items:center;gap:10px}
    .mob-back.show{display:flex}
    .mob-back-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
      border-radius:10px;color:var(--ink-soft);flex-shrink:0}
    .mob-back-btn:active{background:var(--panel)}
    .mob-back-btn svg{width:22px;height:22px}
    .mob-back-title{font-family:"Noto Serif JP",serif;font-size:13px;font-weight:600;color:var(--ink-soft);
      flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mob-back-link{font-size:11px;font-weight:500;color:var(--teal-deep);padding:5px 10px;
      border:1px solid var(--teal);border-radius:7px;white-space:nowrap;flex-shrink:0}

  }

  @media(prefers-reduced-motion:reduce){
    .fade{opacity:1;transform:none;animation:none}html{scroll-behavior:auto}
    .entry,.chip,.bm,.right{transition:none}
  }
</style>
</head>
<body>

<!-- Mobile back bar (only visible when reader is open on mobile) -->
<div class="mob-back" id="mobBack">
  <button class="mob-back-btn" id="mobBackBtn" aria-label="一覧に戻る">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
  </button>
  <div class="mob-back-title" id="mobBackTitle"></div>
  <a class="mob-back-link" id="mobBackLink" href="#" target="_blank" rel="noopener">別タブ</a>
</div>

<div class="shell">
  <div class="left">
    <div class="left-head">
      <div class="eyebrow">Research Archive</div>
    </div>
    <div class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" type="search" placeholder="検索" autocomplete="off" aria-label="記事を検索">
      </div>
      <div class="filters" id="filters"></div>
    </div>
    <div class="count" id="count"></div>
    <main class="list" id="list"></main>
    <div class="empty-msg" id="empty">該当する記事はありません。</div>
  </div>

  <div class="right" id="reader">
    <div class="reader-bar">
      <div class="reader-title" id="readerTitle"></div>
      <a class="reader-link" id="readerLink" href="#" target="_blank" rel="noopener">別タブで開く</a>
    </div>
    <div class="reader-empty" id="readerEmpty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      <span>左の一覧から記事を選ぶと、ここに表示されます</span>
    </div>
  </div>
</div>

<script>
const ARTICLES = [
  { cat:"ウェルビーイング", title:"ウェルビーイングの全体地図", sub:"概念・構造・主要理論、そしてなぜ5つに絞ったか", url:"./wellbeing/00-map/" },
  { cat:"ウェルビーイング", title:"再現性で選ぶウェルビーイング研究", sub:"看板ではなく構成概念にアンカーを打つ", url:"./wellbeing/01-reproducibility/" },
  { cat:"ウェルビーイング", title:"自己決定理論（SDT）深掘り", sub:"量ではなく質の動機づけ、その岩盤と争点", url:"./wellbeing/02-sdt/" },
  { cat:"ウェルビーイング", title:"心理的ウェルビーイング（Ryff PWB）深掘り", sub:"気分ではなく、よく機能して生きる", url:"./wellbeing/03-pwb/" },
  { cat:"ウェルビーイング", title:"主観的ウェルビーイング（Diener SWB）深掘り", sub:"自分の基準で、自分の人生を採点する", url:"./wellbeing/04-swb/" },
  { cat:"ウェルビーイング", title:"ウェルビーイングの哲学 深掘り", sub:"尺度の下にある「良い人生とは何か」", url:"./wellbeing/05-philosophy/" },
  { cat:"ウェルビーイング", title:"ウェルビーイングの経済学 深掘り", sub:"結局、お金は幸せを買うのか", url:"./wellbeing/06-economics/" },
  { cat:"ポジティブ心理学", title:"ポジティブ心理学を読み解く", sub:"光と影の科学", url:"./positive-psychology/01-overview/" },
  { cat:"ポジティブ心理学", title:"繁栄の世界地図", sub:"Global Flourishing Study を読む", url:"./positive-psychology/02-international-happiness/" },
  { cat:"モンテッソーリ教育", num:"01", date:"2026-06-28", title:"モンテッソーリ教育を「根拠の強さ」で仕分ける", sub:"概要・歴史と、自宅に効かせる実践ガイド", url:"./montessori/01-evidence-guide/" },
  { cat:"物理学", num:"01", date:"2026-06-28", title:"量子力学概論", sub:"エネルギーは「飛び飛び」だった──その誕生から未来まで", url:"./physics/01-quantum-mechanics/" },
  { cat:"心理学", num:"01", date:"2026-06-28", title:"心理学の全体地図", sub:"7つの学派、30の分野、そしてあなたの好奇心の行き先", url:"./psychology/01-overview/" },
  { cat:"コーチング", num:"01", date:"2026-06-29", title:"AI時代のコーチング", sub:"人間にしかできないこと、AIに任せるべきこと", url:"./coaching/01-ai-era-coaching/" },
  { cat:"コーチング", num:"02", date:"2026-06-29", title:"コーチングは本当に効くのか", sub:"メタ分析とRCTが示す効果の正体", url:"./coaching/02-coaching-evidence/" },
  { cat:"コーチング", num:"03", date:"2026-06-29", title:"個人コーチ生存戦略", sub:"AI・プラットフォーム・12万人の競合を前に、一人でどう勝つか", url:"./coaching/03-solo-coach-strategy/" },
];

/* ---- flags (localStorage) ---- */
const LS_KEY = 'ra_flags';
let flags = {};
try { flags = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){}
function saveFlags(){ localStorage.setItem(LS_KEY, JSON.stringify(flags)); }
function isFlagged(url){ return !!flags[url]; }
function toggleFlag(url){ if(flags[url]) delete flags[url]; else flags[url]=1; saveFlags(); }

let active = 'all', keyword = '', currentUrl = null;

const listEl=document.getElementById('list'), filtersEl=document.getElementById('filters'),
  countEl=document.getElementById('count'), emptyEl=document.getElementById('empty'),
  qEl=document.getElementById('q'), readerEl=document.getElementById('reader'),
  readerTitle=document.getElementById('readerTitle'), readerLink=document.getElementById('readerLink'),
  readerEmpty=document.getElementById('readerEmpty'),
  mobBack=document.getElementById('mobBack'), mobBackBtn=document.getElementById('mobBackBtn'),
  mobBackTitle=document.getElementById('mobBackTitle'), mobBackLink=document.getElementById('mobBackLink');

function esc(s){return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function hl(t){
  if(!keyword) return esc(t);
  const i=t.toLowerCase().indexOf(keyword.toLowerCase());
  if(i<0) return esc(t);
  return esc(t.slice(0,i))+'<mark>'+esc(t.slice(i,i+keyword.length))+'</mark>'+esc(t.slice(i+keyword.length));
}

/* bookmark SVGs */
const bmOff='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>';
const bmOn='<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>';

const cats=[...new Set(ARTICLES.map(a=>a.cat))];
const catCount=c=>ARTICLES.filter(a=>a.cat===c).length;
const flagCount=()=>ARTICLES.filter(a=>isFlagged(a.url)).length;

function matches(a){
  if(active==='flagged') return isFlagged(a.url)&&(!keyword||(a.title+a.sub+a.cat).toLowerCase().includes(keyword.toLowerCase()));
  const inCat=(active==='all'||a.cat===active);
  if(!inCat) return false;
  if(!keyword) return true;
  return (a.title+a.sub+a.cat).toLowerCase().includes(keyword.toLowerCase());
}

function render(){
  /* chips */
  let ch='<button class="chip '+(active==='all'?'active':'')+'" data-cat="all">すべて<span class="c">'+ARTICLES.length+'</span></button>';
  const fc=flagCount();
  ch+='<button class="chip flag-chip '+(active==='flagged'?'active':'')+'" data-cat="flagged">読みたい'+(fc?'<span class="c">'+fc+'</span>':'')+'</button>';
  cats.forEach(c=>{ch+='<button class="chip '+(active===c?'active':'')+'" data-cat="'+c+'">'+c+'<span class="c">'+catCount(c)+'</span></button>';});
  filtersEl.innerHTML=ch;
  filtersEl.querySelectorAll('.chip').forEach(b=>{b.addEventListener('click',()=>{active=b.dataset.cat;render();});});

  /* list */
  const shown=ARTICLES.filter(matches);
  listEl.innerHTML=shown.map((a,i)=>{
    const f=isFlagged(a.url), act=a.url===currentUrl;
    return '<div class="entry fade'+(act?' is-active':'')+'" style="animation-delay:'+Math.min(i*30,250)+'ms" data-url="'+esc(a.url)+'">'
      +'<button class="bm'+(f?' on':'')+'" data-bm="'+esc(a.url)+'" title="'+(f?'解除':'読みたい')+'" aria-label="ブックマーク">'+(f?bmOn:bmOff)+'</button>'
      +'<div class="cat">'+esc(a.cat)+'</div>'
      +'<div class="t">'+hl(a.title)+'</div>'
      +'<div class="s">'+hl(a.sub)+'</div>'
      +'</div>';
  }).join('');

  listEl.querySelectorAll('.bm').forEach(b=>{b.addEventListener('click',e=>{
    e.stopPropagation();
    const url=b.dataset.bm;
    toggleFlag(url);
    if(active==='flagged'){render();return;}
    /* in-place update: just swap icon + class, no full re-render */
    const now=isFlagged(url);
    b.classList.toggle('on',now);
    b.innerHTML=now?bmOn:bmOff;
    b.title=now?'解除':'読みたい';
    /* update chip count */
    const fc=flagCount();
    const fchip=filtersEl.querySelector('.flag-chip');
    if(fchip){const sp=fchip.querySelector('.c');if(fc){if(sp)sp.textContent=fc;else fchip.insertAdjacentHTML('beforeend','<span class="c">'+fc+'</span>');}else if(sp)sp.remove();}
  });});
  listEl.querySelectorAll('.entry').forEach(el=>{el.addEventListener('click',e=>{if(e.target.closest('.bm'))return;openArticle(el.dataset.url);});});

  countEl.textContent=keyword?'「'+keyword+'」 — '+shown.length+' 件'
    :(active==='all'?'全 '+shown.length+' 篇':active==='flagged'?'読みたい — '+shown.length+' 篇':active+' — '+shown.length+' 篇');
  emptyEl.style.display=shown.length===0?'block':'none';
}

function openArticle(url){
  currentUrl=url;
  const art=ARTICLES.find(a=>a.url===url);
  const title=art?art.title:'';

  const old=document.querySelector('.reader-frame');
  if(old) old.remove();
  readerEmpty.style.display='none';

  const iframe=document.createElement('iframe');
  iframe.className='reader-frame';
  iframe.src=url;
  iframe.setAttribute('loading','lazy');
  readerEl.appendChild(iframe);

  readerTitle.textContent=title;
  readerLink.href=url;

  /* mobile */
  readerEl.classList.add('open');
  mobBack.classList.add('show');
  mobBackTitle.textContent=title;
  mobBackLink.href=url;

  render();
}

function closeReader(){
  currentUrl=null;
  const old=document.querySelector('.reader-frame');
  if(old) old.remove();
  readerEmpty.style.display='';
  readerTitle.textContent='';
  readerEl.classList.remove('open');
  mobBack.classList.remove('show');
  render();
}

mobBackBtn.addEventListener('click',closeReader);
qEl.addEventListener('input',()=>{keyword=qEl.value.trim();render();});
render();
</script>
</body>
</html>
